[build]
  command   = "npm run build"
  publish   = "dist"

# SPA fallback — all routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Force HTTPS
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    # Without this, some browsers' default Cross-Origin-Opener-Policy blocks
    # the Google sign-in popup from messaging back to this window once auth
    # completes — the popup finishes, but signInWithPopup()'s promise on
    # this side just hangs (no error, no result), so the first click looks
    # like it did nothing. same-origin-allow-popups keeps this page isolated
    # from other origins while explicitly permitting popups it opens (Google
    # OAuth, Razorpay checkout) to communicate back.
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"

# Cache built assets forever (they have hashed filenames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Tell bots not to index admin/auth routes
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/trader/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/delivery/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# sitemap and robots.txt — no caching so Google always gets fresh version
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
