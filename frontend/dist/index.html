<!DOCTYPE html>

    <!-- ── Primary SEO ───────────────────────────────────────────────────── -->
    <!-- "Oil" kept singular here (not "Oils") — matches how people actually
         search the category ("coconut oil", "cold pressed oil"), and Google
         was snippeting our old plural-only title/description as a fuzzy
         match with a "Missing: oil" annotation on exact "oil" queries. -->
    <title>Sanathana Tattva — Authentic Cold Pressed Oil | Pure & Natural</title>
    <meta name="description" content="Sanathana Tattva offers authentic cold pressed oil — coconut, sesame, groundnut and more — made with traditional wooden churners. 100% pure, chemical-free, delivered to your door." />
    <meta name="keywords" content="cold pressed oil, wood pressed oil, chekku oil, groundnut oil, sesame oil, coconut oil, pure natural oil, chemical free oil, traditional oil, Sanathana Tattva" />
    <meta name="author" content="Sanathana Tattva" />
    <link rel="canonical" href="https://sanathanatattva.shop/" />

    <!-- ── Google Search Console verification ────────────────────────────── -->
    <!-- Replace the content value with the code from Search Console → Verification → HTML tag method -->

    <meta property="og:site_name"   content="Sanathana Tattva" />

    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="Sanathana Tattva cold pressed oil" />
    <meta property="og:locale"      content="en_IN" />

    <meta name="twitter:image"       content="https://sanathanatattva.shop/og-image.jpg" />

          "@id": "https://sanathanatattva.shop/#website",
          "name": "Sanathana Tattva",
          "url": "https://sanathanatattva.shop",
          "inLanguage": "en-IN",
          "publisher": { "@id": "https://sanathanatattva.shop/#organization" },
